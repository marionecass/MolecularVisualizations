 <h2>AX<sub>3</sub> Molecules</h2>

 <table border ="1">       
<td  valign="top"><span class="c1"><strong>H<sub>2</sub>CO</strong></span><br />

</script>
</td></table></td>


<td>
<script type="text/javascript">
jmolApplet(300,"load NH3.xyz; select all; vectors off; spacefill 0.25; wireframe 0.1; center atomno=1")

    <td  valign="top"><span class="c1"><strong>NH<sub>3</sub></strong></span><br />

jmolCheckbox("spin on", "spin off"
		,"Spin")
</script>

 </td>
</table>
</td>

<td><script type="text/javascript">
