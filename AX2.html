 span.c5 {color: #0000CC}

  <body> 
  <h2>AX<sub>2</sub> Molecules</h2> 
    <table border="1">
<td>
<script type="text/javascript">
jmolApplet(300,"load CO2.mol; spacefill 0.25; wireframe 0.1; center atomno=1")
</script> <br />
 <table border ="1">       
<td  valign="top"><span class="c1"><strong>CO<sub>2</sub></strong></span><br />
<b>Bond Angle = 180<sup>o</sup></b>

<script type="text/javascript">
jmolCheckbox("spin on", "spin off"
		,"Spin")
</script>

</td></table></td>

<td>
<script type="text/javascript">
jmolApplet(300,"load SO2.mol; spacefill 0.25; wireframe 0.1; center atomno=1")
</script> <br />
 <table border ="1">       
<td  valign="top"><span class="c1"><strong>SO<sub>2</sub></strong></span><br />
<b>Bond Angle = 119<sup>o</sup><b />


<script type="text/javascript">
jmolCheckbox("spin on", "spin off"
		,"Spin")
</script>
</td></table></td>


<td>
<script type="text/javascript">
jmolApplet(300,"load H2O.xyz; select all; spacefill 0.25; wireframe 0.1; center atomno=1")
</script> <br />
 <table border ="1"> 
    <td  valign="top"><span class="c1"><strong>H<sub>2</sub>O</strong></span><br />
    <b>Bond Angle = 104.5<sup>o</sup></b>
    
<script type="text/javascript">
jmolCheckbox("spin on", "spin off"
		,"Spin")
</script>

 </td>
</table>
</td>


</tr>
</table>
<b> Note all bonds (double or single) are shown as single rods for simplicity of viewing</b>
